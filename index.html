<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Anonymous Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--border:#1e1e2e;--text:#e0e0e8;--dim:#555;--accent:#6c5ce7;--accent-light:#a29bfe;--me:#1e1e3a;--them:#1a1a24;--radius:16px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

.top{padding:14px 20px;background:var(--surface);border-bottom:1px solid var(--border);text-align:center}
.top h1{font-size:1.1rem;font-weight:800;color:var(--accent-light)}
.top p{font-size:.7rem;color:var(--dim);margin-top:2px}
.online{display:inline-block;width:8px;height:8px;background:#10b981;border-radius:50%;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:6px}
.msg{max-width:80%;padding:10px 14px;border-radius:var(--radius);font-size:.88rem;line-height:1.5;word-break:break-word;position:relative}
.msg.me{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.them{background:var(--them);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
.msg .time{font-size:.6rem;opacity:.5;margin-top:4px;display:block}
.msg .tag{font-size:.65rem;font-weight:800;color:var(--accent-light);margin-bottom:2px;display:block}
.msg.them .tag{color:var(--dim)}

.sys{text-align:center;font-size:.72rem;color:var(--dim);padding:6px;font-style:italic}

.input-bar{padding:10px 16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:8px}
.input-bar input{flex:1;padding:12px 16px;border:2px solid var(--border);border-radius:50px;background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;outline:none}
.input-bar input:focus{border-color:var(--accent)}
.input-bar input::placeholder{color:var(--dim)}
.send-btn{width:48px;height:48px;border:none;background:var(--accent);color:#fff;border-radius:50%;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.send-btn:active{transform:scale(.9)}

.empty{text-align:center;padding:40px;color:var(--dim);font-size:.85rem;margin:auto}
</style>
</head>
<body>

<div class="top">
  <h1>💬 Anonymous Chat</h1>
  <p><span class="online"></span> Everyone is Unknown</p>
</div>

<div class="msgs" id="msgs">
  <div class="empty" id="empty">No messages yet. Say something!</div>
</div>

<div class="input-bar">
  <input id="msg-input" placeholder="Type a message..." maxlength="500" onkeydown="if(event.key==='Enter')send()">
  <button class="send-btn" onclick="send()">➤</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({apiKey:"AIzaSyASPNSXdFs2B3X8mbUq-nBYlgAIR7BSx6E",authDomain:"fortuna-64c00.firebaseapp.com",databaseURL:"https://fortuna-64c00-default-rtdb.firebaseio.com",projectId:"fortuna-64c00",storageBucket:"fortuna-64c00.firebasestorage.app",messagingSenderId:"329218105683",appId:"1:329218105683:web:6b16fd2b1091531e4481a6"});
const db=firebase.database(),R='anonchat';

// Unique ID for this session (so you see your own msgs as "me")
const ME='u_'+Date.now()+'_'+Math.random().toString(36).substr(2,6);

// Random unknown number so people can somewhat tell who's who in a conversation
const NUM=~~(Math.random()*9999);

// Listen for messages (last 100)
db.ref(R).orderByChild('ts').limitToLast(100).on('value',snap=>{
  const msgs=[];
  snap.forEach(c=>{msgs.push({id:c.key,...c.val()})});
  msgs.sort((a,b)=>a.ts-b.ts);
  renderMsgs(msgs);
});

function renderMsgs(msgs){
  const container=document.getElementById('msgs');
  const empty=document.getElementById('empty');
  
  if(!msgs.length){empty.style.display='block';container.innerHTML='';container.appendChild(empty);return}
  empty.style.display='none';
  
  const wasAtBottom=container.scrollHeight-container.scrollTop-container.clientHeight<60;
  
  container.innerHTML=msgs.map(m=>{
    const isMe=m.uid===ME;
    const d=new Date(m.ts);
    const time=d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'});
    return`<div class="msg ${isMe?'me':'them'}">
      <span class="tag">${isMe?'You':'Unknown #'+m.num}</span>
      ${m.text}
      <span class="time">${time}</span>
    </div>`;
  }).join('');
  
  if(wasAtBottom)container.scrollTop=container.scrollHeight;
}

function send(){
  const input=document.getElementById('msg-input');
  const text=input.value.trim();
  if(!text)return;
  
  db.ref(R).push({
    uid:ME,
    num:NUM,
    text:text,
    ts:Date.now()
  });
  
  input.value='';
  input.focus();
}

// Clean old messages (keep last 200)
db.ref(R).orderByChild('ts').limitToFirst(1).once('value',snap=>{
  snap.forEach(c=>{
    db.ref(R).once('value',s=>{
      if(s.numChildren()>200){
        const toDelete=[];let count=0;
        s.forEach(ch=>{if(count<s.numChildren()-200){toDelete.push(ch.key)}count++});
        toDelete.forEach(k=>db.ref(R+'/'+k).remove());
      }
    });
  });
});
</script>
</body>
</html>
